name: "Bambu2 Bug report"
description: "Report a problem with bambu2 (include a minimal reproducible example and session info)."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. The goal of this form is to capture enough detail for a quick fix and/or a clean PR.
        Please **do not include any sensitive/private data**.

  - type: dropdown
    id: bug_area
    attributes:
      label: Area
      description: What part of bambu is affected?
      options:
        - "Installation / loading"
        - "Transcript discovery"
        - "Quantification"
        - "Annotation / reference handling"
        - "Output / plotting / downstream objects"
        - "Performance / memory"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: "What happened? What did you expect to happen instead?"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducible example
      description: |
        Provide the smallest possible code snippet that reproduces the issue.
        Include package imports and any setup. Prefer a **self-contained** example.
      render: r
      placeholder: |
        # minimal code to reproduce
        library(bambu)
        ...
    validations:
      required: true

  - type: textarea
    id: input_data
    attributes:
      label: Input data details (no private data)
      description: |
        Describe the inputs needed to reproduce (e.g., number of reads, reference used, file formats).
        If possible, link to a small public example dataset or provide instructions to generate toy data.
      placeholder: |
        - Long-read platform (ONT / PacBio / other):
        - Reference/annotation source (e.g., GENCODE vXX, Ensembl vXX):
        - Approx. dataset size:
        - File types (BAM/FASTQ/GTF/FASTA/etc):
        - Can you share data? If not, can you share a toy example?
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior / logs
      description: Include the exact error message(s), warnings, and relevant console output.
      placeholder: |
        ```text
        paste error output here
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: frequency
    attributes:
      label: Reproducibility
      description: Does it happen always, sometimes, or only on specific inputs?
      placeholder: "Always / Sometimes / Rarely + any pattern you notice"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Session info
      description: |
        Paste output of:
        - `sessionInfo()`
        - `packageVersion("bambu")`
        If using GitHub dev version, include the commit SHA if known.
      placeholder: |
        ```r
        packageVersion("bambu")
        sessionInfo()
        ```
    validations:
      required: true

  - type: textarea
    id: troubleshooting
    attributes:
      label: What you already tried
      description: List any troubleshooting steps you attempted (reinstall, different reference, parameters, etc.).
      placeholder: "- Tried reinstalling from Bioconductor...\n- Tried different annotation...\n- Tried parameter X..."
    validations:
      required: false

  - type: checkboxes
    id: pr_interest
    attributes:
      label: Contribution
      description: This helps maintainers route the issue.
      options:
        - label: "I can provide a minimal public dataset / toy example for maintainers to reproduce."
          required: false
        - label: "I would be willing to open a pull request for this issue (with guidance if needed)."
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: "I searched existing issues to avoid duplicates."
          required: true
        - label: "I included a minimal reproducible example."
          required: true
        - label: "I included session/environment information."
          required: true
