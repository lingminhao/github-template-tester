name: "Bambu Bug report"
description: "Report a problem with bambu (include a minimal reproducible example and session info)."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! To help us fix it quickly, please provide as much detail as possible.
        Please **do not include any sensitive/private data**.

  - type: dropdown
    id: bug_area
    attributes:
      label: Affected Area
      description: Which part of bambu is having issues?
      options:
        - "Installation / Loading"
        - "Transcript Discovery"
        - "Transcript Quantification"
        - "Annotation"
        - "Bambu Output / Plotting"
        - "Performance (CPU, Memory, Storage)"
        - "Others"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: |
        A clear description of what happened, what you expected to happen, and any troubleshooting you've already tried.
      placeholder: "I ran bambu with X parameters and got Y error, but I expected Z..."
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: Reproduction Steps (Code & Data)
      description: |
        Provide a **self-contained** code snippet and details about your input data.
      render: r
      placeholder: |
        # Example code:
        library(bambu)
        ...
        # Input details:
        - Reads (e.g. ONT/PacBio, Bulk/Single-cell, Protocol):
        - Reference Genome (name & version):
        - Reference Annotation (name & version):
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does this bug occur?
      options:
        - "Always (every time I run this)"
        - "Intermittently (only sometimes)"
        - "Once (haven't been able to repeat it)"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Session Info
      description: |
        Paste the output of `sessionInfo()` and `packageVersion("bambu")`.
      placeholder: |
        ```r
        packageVersion("bambu")
        sessionInfo()
        ```
    validations:
      required: true

  - type: checkboxes
    id: pr_interest
    attributes:
      label: Contribution
      options:
        - label: "I can provide a small public dataset/toy example for reproduction."
        - label: "I would be willing to open a pull request to fix this (with guidance)."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: "I searched existing issues to avoid duplicates."
          required: true
        - label: "I included a minimal reproducible code snippet."
          required: true
        - label: "I included session/environment information."
          required: true
